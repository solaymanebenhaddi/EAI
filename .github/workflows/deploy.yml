name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare Standalone Directory
        run: |
          # Copy static files to the standalone directory
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          
          # Create a tmp directory and restart.txt to trigger cPanel Passenger to restart
          mkdir -p .next/standalone/tmp
          touch .next/standalone/tmp/restart.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Upload everything inside the standalone folder
          local-dir: .next/standalone/
          # Deploy to the eai-construction.com directory (adjust if your FTP user has a different root)
          server-dir: /eai-construction.com/
